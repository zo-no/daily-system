<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日记录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      background: #0d1117;
      color: #c9d1d9;
    }

    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 20px; margin-bottom: 4px; }
    .header .step { font-size: 12px; color: #8b949e; }

    .section {
      margin-bottom: 18px;
      padding: 16px;
      background: #161b22;
      border-radius: 8px;
    }
    .section-title {
      font-size: 13px;
      color: #58a6ff;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .optional { color: #8b949e; font-weight: normal; font-size: 11px; }

    input[type="date"],
    input[type="text"],
    input[type="time"],
    textarea {
      width: 100%;
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
    }
    input:focus,
    textarea:focus {
      outline: none;
      border-color: #58a6ff;
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.6;
    }

    .hint {
      font-size: 12px;
      color: #8b949e;
      margin-top: 8px;
      line-height: 1.5;
    }

    .warn {
      color: #f85149;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    .entry {
      display: grid;
      grid-template-columns: 92px 88px 1fr 28px;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }

    .entry .del-btn {
      background: none;
      border: none;
      color: #6e7681;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }

    .entry .del-btn:hover { color: #f85149; }

    .add-btn {
      width: 100%;
      background: #21262d;
      border: 1px dashed #30363d;
      color: #8b949e;
      padding: 9px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
    }

    .add-btn:hover {
      border-color: #58a6ff;
      color: #58a6ff;
    }

    .mood-group {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 4px;
    }

    .mood-btn {
      background: #21262d;
      border: 2px solid #30363d;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }

    .mood-btn:hover { transform: scale(1.05); }
    .mood-btn.selected { transform: scale(1.12); border-width: 3px; }
    .mood-btn.high.selected { border-color: #3fb950; background: #1f3d1f; }
    .mood-btn.mid.selected { border-color: #d29922; background: #3d2e1f; }
    .mood-btn.low.selected { border-color: #f85149; background: #3d1f1f; }

    .next-btn {
      width: 100%;
      background: #238636;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    .next-btn:hover { background: #2ea043; }

    @media (max-width: 480px) {
      .entry {
        grid-template-columns: 82px 76px 1fr 24px;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📓 每日记录</h1>
    <div class="step">第 1 步 / 共 2 步 · 自由输入（推荐）</div>
  </div>

  <div class="section">
    <div class="section-title">📅 日期</div>
    <input type="date" id="dateInput">
  </div>

  <div class="section">
    <div class="section-title">📝 今日原始记录 <span style="color:#f85149;font-size:11px;">必填</span></div>
    <textarea id="rawInput" placeholder="想写什么就写什么，不强制时间线。\n\n示例（可参考，不是必须）：\n00:44 [💤 睡眠]\n结束了一天的忙碌，准备睡觉。\n\n09:20-09:59 [👥 关系]\n刷短视频后和朋友聊了就业形势，最后确定今天先梳理定时任务。\n\n11:40 [📄 工作]\n思考下一步要和 Claude Code 沟通需求。"></textarea>
    <div class="hint">建议一条一条写，时间和标签都可以后补。下一步会自动检查“哪里还不清楚”。</div>
    <div class="warn" id="rawWarn">请先填写今天的原始记录</div>
  </div>

  <div class="section">
    <div class="section-title">⏰ 可选：补充几个关键时间点 <span class="optional">（不填也可以）</span></div>
    <div id="entries"></div>
    <div class="add-btn" onclick="addEntry()">＋ 添加一条可选时间点</div>
    <div class="hint">用途：如果你已经确定某些关键时间点，可以先填，后面会一起分析。</div>
  </div>

  <div class="section">
    <div class="section-title">😊 今日心情 <span class="optional">（选填）</span></div>
    <div class="mood-group">
      <div class="mood-btn high" onclick="selectMood(this, 'high')" title="高效">🟢</div>
      <div class="mood-btn mid" onclick="selectMood(this, 'mid')" title="一般">🟡</div>
      <div class="mood-btn low" onclick="selectMood(this, 'low')" title="疲惫">🔴</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">💭 今日感悟 <span class="optional">（选填）</span></div>
    <textarea id="insight" placeholder="今天有什么想法或收获？" style="min-height:80px;"></textarea>
  </div>

  <div class="section">
    <div class="section-title">🚀 明日计划 <span class="optional">（选填）</span></div>
    <input type="text" id="tomorrow" placeholder="明天最重要的一件事">
  </div>

  <button class="next-btn" onclick="goNext()">下一步：AI 检查可补充点 →</button>

  <script>
    const today = new Date();
    const pad = n => String(n).padStart(2, '0');
    const todayStr = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;
    document.getElementById('dateInput').value = todayStr;

    let selectedMood = null;

    function addEntry(time = '', tag = '', text = '') {
      const div = document.createElement('div');
      div.className = 'entry';
      div.innerHTML = `
        <input type="time" class="time-input" value="${time}" title="时间">
        <input type="text" class="tag-input" value="${tag}" placeholder="标签" title="标签（可选）">
        <input type="text" class="text-input" value="${text}" placeholder="这段做了什么？" title="内容">
        <button class="del-btn" onclick="this.parentElement.remove()" title="删除">×</button>
      `;
      document.getElementById('entries').appendChild(div);
      div.querySelector('.text-input').focus();
    }

    function selectMood(el, mood) {
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      selectedMood = mood;
    }

    function collectOptionalTimeline() {
      const list = [];
      document.querySelectorAll('.entry').forEach(el => {
        const time = el.querySelector('.time-input').value;
        const tag = el.querySelector('.tag-input').value.trim();
        const text = el.querySelector('.text-input').value.trim();
        if (!time && !tag && !text) return;
        list.push({ time, tag, text });
      });
      return list;
    }

    function goNext() {
      const rawText = document.getElementById('rawInput').value.trim();
      if (!rawText) {
        document.getElementById('rawWarn').style.display = 'block';
        return;
      }

      document.getElementById('rawWarn').style.display = 'none';

      const data = {
        date: document.getElementById('dateInput').value,
        rawText,
        quickTimeline: collectOptionalTimeline(),
        mood: selectedMood,
        insight: document.getElementById('insight').value.trim(),
        tomorrow: document.getElementById('tomorrow').value.trim()
      };

      sessionStorage.setItem('diary-draft', JSON.stringify(data));
      window.location.href = '/review.html';
    }
  </script>
</body>
</html>
