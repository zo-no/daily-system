<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日记录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 500px; margin: 0 auto; padding: 20px;
      background: #0d1117; color: #c9d1d9;
    }
    h1 { text-align: center; margin-bottom: 20px; font-size: 20px; }
    
    .section { margin-bottom: 25px; padding: 15px; background: #161b22; border-radius: 8px; }
    .section-title { font-size: 14px; color: #58a6ff; margin-bottom: 12px; }
    
    .entry {
      display: flex; gap: 10px; margin-bottom: 10px; align-items: center;
    }
    .time-input {
      width: 80px; background: #21262d; border: 1px solid #30363d;
      color: #c9d1d9; padding: 10px; border-radius: 6px; font-size: 14px; text-align: center;
    }
    .text-input {
      flex: 1; background: #21262d; border: 1px solid #30363d;
      color: #c9d1d9; padding: 10px; border-radius: 6px; font-size: 14px;
    }
    .text-input:focus, .time-input:focus { outline: none; border-color: #58a6ff; }
    
    .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
    .quick-btn {
      background: #21262d; border: 1px solid #30363d;
      color: #8b949e; padding: 6px 12px; border-radius: 16px;
      font-size: 12px; cursor: pointer;
    }
    .quick-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    
    textarea {
      width: 100%; background: #21262d; border: 1px solid #30363d;
      color: #c9d1d9; padding: 10px; border-radius: 6px; font-size: 14px;
      min-height: 60px; resize: vertical;
    }
    textarea:focus { outline: none; border-color: #58a6ff; }
    
    input[type="text"] {
      width: 100%; background: #21262d; border: 1px solid #30363d;
      color: #c9d1d9; padding: 10px; border-radius: 6px; font-size: 14px;
    }
    input[type="text"]:focus { outline: none; border-color: #58a6ff; }
    
    .mood-group { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
    .mood-btn {
      background: #21262d; border: 2px solid #30363d;
      width: 60px; height: 60px; border-radius: 50%;
      cursor: pointer; font-size: 24px; transition: all 0.2s;
    }
    .mood-btn.selected { transform: scale(1.1); border-width: 3px; }
    .mood-btn.high.selected { border-color: #3fb950; background: #1f3d1f; }
    .mood-btn.medium.selected { border-color: #d29922; background: #3d2e1f; }
    .mood-btn.low.selected { border-color: #f85149; background: #3d1f1f; }
    
    .add-btn {
      background: #21262d; border: 1px dashed #30363d;
      color: #8b949e; padding: 10px; border-radius: 6px;
      width: 100%; cursor: pointer; text-align: center; margin-bottom: 20px;
    }
    .add-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    
    .submit-btn {
      width: 100%; background: #238636; color: white;
      border: none; padding: 16px; border-radius: 8px;
      font-size: 16px; font-weight: bold; cursor: pointer;
    }
    .submit-btn:hover { background: #2ea043; }
    
    .date-picker { margin-bottom: 20px; }
    .date-picker input {
      width: 100%; background: #21262d; border: 1px solid #30363d;
      color: #c9d1d9; padding: 10px; border-radius: 6px;
    }
    
    .success { text-align: center; padding: 40px; display: none; }
    .success h2 { color: #3fb950; margin-bottom: 10px; }
    
    .optional { opacity: 0.6; font-size: 12px; }
  </style>
</head>
<body>
  <h1>📓 每日记录</h1>
  
  <div class="date-picker">
    <input type="date" id="dateInput">
  </div>
  
  <!-- 必填：时间线 -->
  <div class="section">
    <div class="section-title">⏰ 时间线（必填）</div>
    <div class="quick-btns">
      <div class="quick-btn" onclick="quickAdd('06:00 起床')">06:00 起床</div>
      <div class="quick-btn" onclick="quickAdd('07:00 起床')">07:00 起床</div>
      <div class="quick-btn" onclick="quickAdd('08:00 起床')">08:00 起床</div>
      <div class="quick-btn" onclick="quickAdd('09:00 通勤')">通勤</div>
      <div class="quick-btn" onclick="quickAdd('10:00 工作')">工作</div>
      <div class="quick-btn" onclick="quickAdd('12:00 午休')">午休</div>
      <div class="quick-btn" onclick="quickAdd('18:00 下班')">下班</div>
      <div class="quick-btn" onclick="quickAdd('22:00 睡觉')">睡觉</div>
    </div>
    <div id="entries">
      <div class="entry">
        <input type="time" class="time-input" value="09:00">
        <input type="text" class="text-input" placeholder="做什么？">
      </div>
    </div>
    <div class="add-btn" onclick="addEntry()">+ 添加时间点</div>
  </div>
  
  <!-- 选填：心情 -->
  <div class="section">
    <div class="section-title">😊 心情 <span class="optional">（选填）</span></div>
    <div class="mood-group">
      <div class="mood-btn high" onclick="selectMood(this, 'high')">🟢</div>
      <div class="mood-btn medium" onclick="selectMood(this, 'medium')">🟡</div>
      <div class="mood-btn low" onclick="selectMood(this, 'low')">🔴</div>
    </div>
  </div>
  
  <!-- 选填：感悟 -->
  <div class="section">
    <div class="section-title">💭 今日感悟 <span class="optional">（选填）</span></div>
    <textarea id="insight" placeholder="今天有什么想法？"></textarea>
  </div>
  
  <!-- 选填：成就 -->
  <div class="section">
    <div class="section-title">🎯 今日成就 <span class="optional">（选填）</span></div>
    <textarea id="achievement" placeholder="今天最骄傲的事？"></textarea>
  </div>
  
  <!-- 选填：明日计划 -->
  <div class="section">
    <div class="section-title">🚀 明日计划 <span class="optional">（选填）</span></div>
    <input type="text" id="tomorrow" placeholder="明天最重要的一件事">
  </div>
  
  <button class="submit-btn" onclick="submit()">🚀 提交记录</button>
  
  <div class="success" id="success">
    <h2>✅ 已提交！</h2>
    <p>数据已保存</p>
  </div>
  
  <script>
    const today = new Date();
    document.getElementById('dateInput').value = 
      `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    
    function addEntry() {
      const div = document.createElement('div');
      div.className = 'entry';
      div.innerHTML = '<input type="time" class="time-input"><input type="text" class="text-input" placeholder="做什么？">';
      document.getElementById('entries').appendChild(div);
    }
    
    function quickAdd(text) {
      const div = document.createElement('div');
      div.className = 'entry';
      const [time, ...rest] = text.split(' ');
      div.innerHTML = `<input type="time" class="time-input" value="${time}"><input type="text" class="text-input" value="${rest.join(' ')}">`;
      document.getElementById('entries').appendChild(div);
    }
    
    let selectedMood = null;
    function selectMood(el, mood) {
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      selectedMood = mood;
    }
    
    async function submit() {
      const date = document.getElementById('dateInput').value;
      
      // 收集时间线
      const timeline = [];
      document.querySelectorAll('.entry').forEach(el => {
        const time = el.querySelector('.time-input').value;
        const text = el.querySelector('.text-input').value;
        if (time && text) timeline.push(`${time} ${text}`);
      });
      
      // 组装数据
      const data = {
        date: date,
        timeline: timeline.join('\n'),
        mood: selectedMood,
        insight: document.getElementById('insight').value,
        achievement: document.getElementById('achievement').value,
        tomorrow: document.getElementById('tomorrow').value
      };
      
      try {
        await fetch('/api/diary', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data)
        });
      } catch(e) {
        console.log(e);
      }
      
      document.querySelector('.section').style.display = 'none';
      document.querySelector('.submit-btn').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    }
  </script>
</body>
</html>
