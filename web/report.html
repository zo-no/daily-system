<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日分析</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 520px; margin: 0 auto; padding: 20px 16px 40px;
      background: #0d1117; color: #c9d1d9;
    }

    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 20px; margin-bottom: 4px; }
    .header .date { font-size: 13px; color: #8b949e; }

    .back-btn {
      background: none; border: 1px solid #30363d; color: #8b949e;
      padding: 6px 14px; border-radius: 6px; cursor: pointer;
      font-size: 13px; margin-bottom: 20px;
    }
    .back-btn:hover { border-color: #58a6ff; color: #58a6ff; }

    .section {
      background: #161b22; border-radius: 8px; padding: 16px;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 13px; color: #58a6ff; font-weight: 600; margin-bottom: 14px;
    }

    /* 时间分类条形图 */
    .category-list { display: flex; flex-direction: column; gap: 10px; }
    .cat-row { display: flex; align-items: center; gap: 10px; }
    .cat-label { width: 72px; font-size: 12px; color: #8b949e; text-align: right; flex-shrink: 0; }
    .cat-bar-wrap { flex: 1; background: #21262d; border-radius: 4px; height: 16px; overflow: hidden; }
    .cat-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .cat-value { width: 40px; font-size: 12px; color: #8b949e; text-align: right; flex-shrink: 0; }

    /* 时间线 */
    .tl-item {
      display: flex; gap: 10px; align-items: baseline;
      font-size: 13px; padding: 4px 0; border-bottom: 1px solid #21262d;
    }
    .tl-item:last-child { border-bottom: none; }
    .tl-time { color: #8b949e; min-width: 52px; font-variant-numeric: tabular-nums; }
    .tl-text { color: #c9d1d9; flex: 1; line-height: 1.4; }
    .tl-supplement { color: #3fb950; }
    .tl-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0; margin-top: 4px;
    }

    /* 心情 */
    .mood-display { text-align: center; font-size: 36px; margin: 8px 0; }
    .mood-label { text-align: center; font-size: 13px; color: #8b949e; }

    /* 文本块 */
    .text-block { font-size: 14px; line-height: 1.7; color: #c9d1d9; }

    /* 统计数字 */
    .stats-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat-card {
      flex: 1; min-width: 80px; background: #21262d; border-radius: 6px;
      padding: 12px; text-align: center;
    }
    .stat-num { font-size: 22px; font-weight: bold; color: #58a6ff; }
    .stat-label { font-size: 11px; color: #8b949e; margin-top: 2px; }

    /* 加载/错误 */
    .loading { text-align: center; padding: 60px; color: #8b949e; }
    .error { text-align: center; padding: 40px; color: #f85149; }
    .error a { color: #58a6ff; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">加载中…</div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const date = params.get('date') || new Date().toISOString().split('T')[0];

    // 时间分类规则（对应 diary-builder 的六类）
    const CATEGORIES = [
      { key: 'work',    label: '核心工作', color: '#3fb950', patterns: [/工作/, /开发/, /写代码/, /编程/, /会议/, /开会/, /项目/, /任务/, /debug/, /调试/] },
      { key: 'learn',   label: '个人发展', color: '#58a6ff', patterns: [/学习/, /阅读/, /读书/, /练习/, /研究/, /复习/, /课/, /培训/] },
      { key: 'life',    label: '生活管理', color: '#d29922', patterns: [/吃饭/, /做饭/, /购物/, /家务/, /通勤/, /出行/, /洗澡/, /洗漱/, /午休/, /起床/] },
      { key: 'social',  label: '社交娱乐', color: '#a371f7', patterns: [/聊天/, /朋友/, /聚餐/, /娱乐/, /游戏/, /电影/, /逛/] },
      { key: 'rest',    label: '休息',     color: '#8b949e', patterns: [/睡/, /休息/, /冥想/, /午睡/, /小憩/] },
      { key: 'drain',   label: '消耗',     color: '#f85149', patterns: [/刷手机/, /刷视频/, /发呆/, /摸鱼/, /无聊/] }
    ];

    function classifyEntry(text) {
      for (const cat of CATEGORIES) {
        if (cat.patterns.some(p => p.test(text))) return cat;
      }
      return { key: 'other', label: '其他', color: '#30363d' };
    }

    function parseTimeToMin(timeStr) {
      // 支持 "HH:MM" 和 "HH:MM–HH:MM"
      const base = timeStr.split('–')[0];
      const [h, m] = base.split(':').map(Number);
      if (isNaN(h) || isNaN(m)) return null;
      return h * 60 + m;
    }

    function calcDurations(timeline) {
      const result = [];
      for (let i = 0; i < timeline.length; i++) {
        const cur = timeline[i];
        const startMin = parseTimeToMin(cur.time);
        if (startMin === null) continue;

        let durationMin = 0;
        // 如果是时间段格式 "HH:MM–HH:MM"
        if (cur.time.includes('–')) {
          const parts = cur.time.split('–');
          const [h2, m2] = parts[1].split(':').map(Number);
          durationMin = (h2 * 60 + m2) - startMin;
        } else if (i < timeline.length - 1) {
          const nextMin = parseTimeToMin(timeline[i + 1].time);
          if (nextMin !== null && nextMin > startMin) {
            durationMin = nextMin - startMin;
          }
        }

        const cat = classifyEntry(cur.text);
        result.push({ ...cur, startMin, durationMin, category: cat });
      }
      return result;
    }

    function aggregateCategories(items) {
      const totals = {};
      CATEGORIES.forEach(c => { totals[c.key] = 0; });
      totals['other'] = 0;

      items.forEach(item => {
        const key = item.category.key;
        totals[key] = (totals[key] || 0) + item.durationMin;
      });
      return totals;
    }

    function fmtMin(min) {
      if (min <= 0) return '—';
      const h = Math.floor(min / 60);
      const m = min % 60;
      if (h === 0) return `${m}m`;
      if (m === 0) return `${h}h`;
      return `${h}h${m}m`;
    }

    const MOOD_MAP = {
      high: { emoji: '🟢', label: '高效充实' },
      mid:  { emoji: '🟡', label: '平稳一般' },
      low:  { emoji: '🔴', label: '疲惫低落' }
    };

    function render(data) {
      const items = calcDurations(data.timeline || []);
      const totals = aggregateCategories(items);
      const maxMin = Math.max(...Object.values(totals), 1);
      const totalTracked = Object.values(totals).reduce((a, b) => a + b, 0);
      const entryCount = (data.timeline || []).length;
      const supplementCount = (data.timeline || []).filter(e => e.supplement).length;

      const moodInfo = data.mood ? MOOD_MAP[data.mood] : null;

      document.getElementById('app').innerHTML = `
        <div class="header">
          <h1>📊 今日分析</h1>
          <div class="date">${data.date}</div>
        </div>

        <button class="back-btn" onclick="window.location.href='/'">← 新建记录</button>

        <!-- 统计概览 -->
        <div class="section">
          <div class="section-title">📈 记录概览</div>
          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-num">${entryCount}</div>
              <div class="stat-label">时间条目</div>
            </div>
            <div class="stat-card">
              <div class="stat-num">${supplementCount}</div>
              <div class="stat-label">AI 补充</div>
            </div>
            <div class="stat-card">
              <div class="stat-num">${fmtMin(totalTracked)}</div>
              <div class="stat-label">已追踪</div>
            </div>
            ${moodInfo ? `
            <div class="stat-card">
              <div class="stat-num">${moodInfo.emoji}</div>
              <div class="stat-label">${moodInfo.label}</div>
            </div>` : ''}
          </div>
        </div>

        <!-- 时间分类 -->
        <div class="section">
          <div class="section-title">⏱ 时间分类（柳比歇夫式）</div>
          <div class="category-list">
            ${CATEGORIES.map(cat => {
              const min = totals[cat.key] || 0;
              const pct = Math.round(min / maxMin * 100);
              return `
                <div class="cat-row">
                  <div class="cat-label">${cat.label}</div>
                  <div class="cat-bar-wrap">
                    <div class="cat-bar" style="width:${pct}%;background:${cat.color};"></div>
                  </div>
                  <div class="cat-value">${fmtMin(min)}</div>
                </div>`;
            }).join('')}
          </div>
        </div>

        <!-- 完整时间线 -->
        <div class="section">
          <div class="section-title">📋 完整时间线</div>
          ${items.map(item => `
            <div class="tl-item">
              <div class="tl-dot" style="background:${item.category.color};"></div>
              <div class="tl-time">${item.time}</div>
              <div class="tl-text ${item.supplement ? 'tl-supplement' : ''}">
                ${item.supplement ? '[补充] ' : ''}${item.text}
                ${item.durationMin > 0 ? `<span style="color:#6e7681;font-size:11px;"> · ${fmtMin(item.durationMin)}</span>` : ''}
              </div>
            </div>
          `).join('')}
        </div>

        ${data.insight ? `
        <div class="section">
          <div class="section-title">💭 今日感悟</div>
          <div class="text-block">${data.insight}</div>
        </div>` : ''}

        ${data.tomorrow ? `
        <div class="section">
          <div class="section-title">🚀 明日计划</div>
          <div class="text-block">${data.tomorrow}</div>
        </div>` : ''}
      `;
    }

    async function load() {
      try {
        const res = await fetch(`/api/report/${date}`);
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        render(data);
      } catch (e) {
        document.getElementById('app').innerHTML = `
          <div class="error">
            <p>找不到 ${date} 的记录</p>
            <p style="margin-top:10px;font-size:13px;"><a href="/">返回填写</a></p>
          </div>`;
      }
    }

    load();
  </script>
</body>
</html>
