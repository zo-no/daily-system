<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeno 日记完善</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 500px; margin: 0 auto; padding: 20px;
      background: #0d1117; color: #c9d1d9;
    }
    h1 { text-align: center; margin-bottom: 10px; font-size: 20px; }
    .subtitle { text-align: center; color: #8b949e; margin-bottom: 30px; }
    
    .question { margin-bottom: 25px; padding: 15px; background: #161b22; border-radius: 8px; }
    .question-label { font-size: 14px; margin-bottom: 10px; color: #58a6ff; }
    .question-hint { font-size: 12px; color: #8b949e; margin-bottom: 10px; }
    
    textarea {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      color: #c9d1d9; padding: 12px; border-radius: 6px; font-size: 14px;
      min-height: 60px; resize: vertical;
    }
    textarea:focus { outline: none; border-color: #58a6ff; }
    
    .timeline-item {
      display: flex; gap: 10px; margin-bottom: 10px;
    }
    .timeline-item input[type="time"] {
      background: #21262d; border: 1px solid #30363d;
      color: #c9d1d9; padding: 8px; border-radius: 4px;
    }
    .timeline-item input[type="text"] {
      flex: 1; background: #21262d; border: 1px solid #30363d;
      color: #c9d1d9; padding: 8px; border-radius: 4px;
    }
    .add-btn {
      background: #21262d; border: 1px dashed #30363d;
      color: #8b949e; padding: 10px; border-radius: 6px;
      width: 100%; cursor: pointer; text-align: center;
    }
    
    .submit-btn {
      width: 100%; background: #238636; color: white;
      border: none; padding: 16px; border-radius: 8px;
      font-size: 16px; font-weight: bold; cursor: pointer;
      margin-top: 20px;
    }
    
    .success { text-align: center; padding: 40px; display: none; }
    .success h2 { color: #3fb950; }
  </style>
</head>
<body>
  <h1>🤖 Zeno 日记完善</h1>
  <div class="subtitle">2026-03-10 · 周二</div>
  
  <form id="form">
    <!-- 时间线 -->
    <div class="question">
      <div class="question-label">⏰ 补充时间线</div>
      <div class="question-hint">今天主要做了什么？按时间顺序</div>
      <div id="timeline">
        <div class="timeline-item">
          <input type="time" value="10:34">
          <input type="text" placeholder="指挥官要求搭建打卡系统">
        </div>
        <div class="timeline-item">
          <input type="time" value="11:20">
          <input type="text" placeholder="创建 daily-tracker skill">
        </div>
      </div>
      <div class="add-btn" onclick="addTimeline()">+ 添加时间点</div>
    </div>
    
    <!-- 洞察 -->
    <div class="question">
      <div class="question-label">💭 今日洞察</div>
      <div class="question-hint">学到了什么？有什么新想法？</div>
      <textarea id="insight" placeholder="今天最大的收获是..."></textarea>
    </div>
    
    <!-- 成就 -->
    <div class="question">
      <div class="question-label">😊 今日成就</div>
      <div class="question-hint">今天最骄傲的是什么？</div>
      <textarea id="achievement" placeholder="完成了..."></textarea>
    </div>
    
    <!-- 困难 -->
    <div class="question">
      <div class="question-label">😔 遇到困难</div>
      <div class="question-hint">卡在哪里了？需要什么帮助？</div>
      <textarea id="blocker" placeholder="没有/或者描述困难..."></textarea>
    </div>
    
    <!-- 行动 -->
    <div class="question">
      <div class="question-label">🎯 明天行动</div>
      <div class="question-hint">有什么要做的？</div>
      <textarea id="tomorrow" placeholder="继续完善..."></textarea>
    </div>
    
    <button type="submit" class="submit-btn">💾 保存日记</button>
  </form>
  
  <div class="success" id="success">
    <h2>✅ 日记已完善！</h2>
    <p>Zeno 的反思记录更新啦～</p>
  </div>
  
  <script>
    function addTimeline() {
      const div = document.createElement('div');
      div.className = 'timeline-item';
      div.innerHTML = '<input type="time" value="12:00"><input type="text" placeholder="...">';
      document.getElementById('timeline').appendChild(div);
    }
    
    document.getElementById('form').onsubmit = async function(e) {
      e.preventDefault();
      
      // 收集时间线
      const timeline = [];
      document.querySelectorAll('.timeline-item').forEach(item => {
        const time = item.querySelector('input[type="time"]').value;
        const text = item.querySelector('input[type="text"]').value;
        if (time && text) timeline.push(`${time} ${text}`);
      });
      
      const data = {
        date: "2026-03-10",
        timeline: timeline,
        insight: document.getElementById('insight').value,
        achievement: document.getElementById('achievement').value,
        blocker: document.getElementById('blocker').value,
        tomorrow: document.getElementById('tomorrow').value
      };
      
      try {
        await fetch('/api/zeno-diary', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data)
        });
      } catch(err) {
        console.log(err);
      }
      
      document.getElementById('form').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    };
  </script>
</body>
</html>
