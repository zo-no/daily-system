<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日记录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 500px; margin: 0 auto; padding: 20px;
      background: #0d1117; color: #c9d1d9;
    }
    h1 { text-align: center; margin-bottom: 20px; font-size: 20px; }
    
    .entry {
      display: flex; gap: 10px; margin-bottom: 12px;
      align-items: center;
    }
    .time-input {
      width: 90px; background: #21262d; border: 1px solid #30363d;
      color: #c9d1d9; padding: 12px; border-radius: 6px; font-size: 16px;
      text-align: center;
    }
    .text-input {
      flex: 1; background: #21262d; border: 1px solid #30363d;
      color: #c9d1d9; padding: 12px; border-radius: 6px; font-size: 16px;
    }
    .text-input:focus, .time-input:focus { outline: none; border-color: #58a6ff; }
    
    .add-btn {
      background: #21262d; border: 1px dashed #30363d;
      color: #8b949e; padding: 12px; border-radius: 6px;
      width: 100%; cursor: pointer; text-align: center; margin-bottom: 20px;
    }
    .add-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    
    .quick-btns {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
    }
    .quick-btn {
      background: #21262d; border: 1px solid #30363d;
      color: #8b949e; padding: 6px 12px; border-radius: 16px;
      font-size: 12px; cursor: pointer;
    }
    .quick-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    
    .submit-btn {
      width: 100%; background: #238636; color: white;
      border: none; padding: 16px; border-radius: 8px;
      font-size: 18px; font-weight: bold; cursor: pointer;
    }
    .submit-btn:hover { background: #2ea043; }
    
    .success { text-align: center; padding: 40px; display: none; }
    .success h2 { color: #3fb950; margin-bottom: 10px; }
    .date-picker { margin-bottom: 20px; }
    .date-picker input {
      width: 100%; background: #21262d; border: 1px solid #30363d;
      color: #c9d1d9; padding: 10px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>📝 每日记录</h1>
  
  <div class="date-picker">
    <input type="date" id="dateInput">
  </div>
  
  <div class="quick-btns">
    <div class="quick-btn" onclick="quickAdd('09:00 起床')">09:00 起床</div>
    <div class="quick-btn" onclick="quickAdd('09:30 通勤')">通勤</div>
    <div class="quick-btn" onclick="quickAdd('10:00 工作')">工作</div>
    <div class="quick-btn" onclick="quickAdd('12:00 午休')">午休</div>
    <div class="quick-btn" onclick="quickAdd('13:00 工作')">工作</div>
    <div class="quick-btn" onclick="quickAdd('18:00 下班')">下班</div>
    <div class="quick-btn" onclick="quickBtn()">🤖 AI补充</div>
  </div>
  
  <div id="entries">
    <div class="entry">
      <input type="time" class="time-input" value="09:00">
      <input type="text" class="text-input" placeholder="做什么？">
    </div>
  </div>
  
  <div class="add-btn" onclick="addEntry()">+ 添加时间点</div>
  
  <button class="submit-btn" onclick="submit()">🚀 提交记录</button>
  
  <div class="success" id="success">
    <h2>✅ 已提交！</h2>
    <p>Zeno 正在处理中...</p>
  </div>
  
  <script>
    const today = new Date();
    document.getElementById('dateInput').value = 
      `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    
    function addEntry() {
      const div = document.createElement('div');
      div.className = 'entry';
      div.innerHTML = '<input type="time" class="time-input"><input type="text" class="text-input" placeholder="做什么？">';
      document.getElementById('entries').appendChild(div);
    }
    
    function quickAdd(text) {
      const div = document.createElement('div');
      diventry';
      const [time, ...rest] = text.split(' ');
     .className = ' div.innerHTML = `<input type="time" class="time-input" value="${time}"><input type="text" class="text-input" value="${rest.join(' ')}">`;
      document.getElementById('entries').appendChild(div);
    }
    
    function quickBtn() {
      // 常用组合
      const combos = [
        ['09:00 起床', '09:30 通勤', '10:00 开始工作'],
        ['12:00 午休', '13:00 继续工作'],
        ['18:00 下班', '19:00 晚餐', '20:00 放松']
      ];
      const random = combos[Math.floor(Math.random() * combos.length)];
      random.forEach(t => quickAdd(t));
    }
    
    async function submit() {
      const date = document.getElementById('dateInput').value;
      const entries = [];
      document.querySelectorAll('.entry').forEach(el => {
        const time = el.querySelector('.time-input').value;
        const text = el.querySelector('.text-input').value;
        if (time && text) entries.push(`${time} ${text}`);
      });
      
      const data = { date, entries: entries.join('\n') };
      
      try {
        await fetch('/api/log', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data)
        });
      } catch(e) {}
      
      document.getElementById('entries').style.display = 'none';
      document.querySelector('.add-btn').style.display = 'none';
      document.querySelector('.submit-btn').style.display = 'none';
      document.querySelector('.quick-btns').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    }
  </script>
</body>
</html>
